name: Build and Release Standalone Executable

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Standalone EXE
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Restore NuGet Packages
      run: dotnet restore RoundedTB/RoundedTB.sln

    - name: Publish Standalone Executable
      run: |
        dotnet publish RoundedTB/RoundedTB/RoundedTB.csproj -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=true --self-contained true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish_out

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RoundedTB-standalone
        path: publish_out/RoundedTB.exe

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: publish_out/RoundedTB.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
